# The registry's own identity and the permission it needs to delegate auth
# to the cluster. `--auth k8s` calls TokenReview (authenticate the presented
# token) and SubjectAccessReview (authorize the operation) against the API
# server; the built-in `system:auth-delegator` ClusterRole grants exactly
# `create` on both of those subresources and nothing else.
#
# This is the ONLY standing permission the registry holds. It stores no user
# credentials — every human/robot identity lives in the cluster.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rspace-registry
  namespace: rspace-registry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rspace-registry-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: rspace-registry
    namespace: rspace-registry
