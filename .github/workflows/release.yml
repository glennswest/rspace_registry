name: release

# Releases are **alpha** by default — that's how we ship until manually
# promoted. Two ways the type gets set:
#
#   1. Tag suffix: vX.Y.Z-alpha.N / vX.Y.Z-beta.N / vX.Y.Z-rc.N → that
#      flavor. Plain vX.Y.Z (no suffix) → still alpha by default.
#   2. workflow_dispatch — manual run with the `release_type` input
#      = alpha | beta | production.
#
# Only `production` flips prerelease=false on the GitHub Release.
# alpha and beta both keep prerelease=true.
#
# Like ci.yml, builds run on forcicd (GH Actions bandwidth conservation).
# The GitHub side skips every job; the softprops/action-gh-release step
# inside the build job runs on forcicd and publishes binaries to
# github.com via the GH_PAT secret.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_type:
        description: 'alpha (default) | beta | production'
        required: false
        default: alpha
        type: choice
        options: [alpha, beta, production]

permissions:
  contents: write   # to upload assets to the release

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve:
    name: resolve release type
    if: github.server_url != 'https://github.com'
    runs-on: ubuntu-latest
    outputs:
      release_type: ${{ steps.x.outputs.release_type }}
      prerelease:   ${{ steps.x.outputs.prerelease }}
    steps:
      - id: x
        run: |
          # Manual dispatch input wins. Otherwise infer from tag suffix.
          if [ -n "${{ inputs.release_type }}" ]; then
            t="${{ inputs.release_type }}"
          else
            tag="${GITHUB_REF_NAME}"
            case "$tag" in
              *-alpha*|*-a.*) t=alpha ;;
              *-beta*|*-b.*)  t=beta  ;;
              *-rc*)          t=beta  ;;
              *)              t=alpha ;;  # default is alpha — promote manually via workflow_dispatch
            esac
          fi
          case "$t" in
            production) pr=false ;;
            *)          pr=true  ;;
          esac
          echo "release_type=$t" >>"$GITHUB_OUTPUT"
          echo "prerelease=$pr"  >>"$GITHUB_OUTPUT"
          echo "resolved: release_type=$t prerelease=$pr"

  build:
    needs: resolve
    name: build ${{ matrix.arch }} (${{ needs.resolve.outputs.release_type }})
    if: github.server_url != 'https://github.com'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2.7.3
      - name: install cross linker for aarch64
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - name: build release binary
        run: |
          cargo build --release \
            --target ${{ matrix.arch }}-unknown-linux-gnu \
            -p rspace-registry
      - name: package
        id: pkg
        run: |
          mkdir -p dist
          out="rspace-registry-${GITHUB_REF_NAME}-${{ matrix.arch }}-linux"
          mkdir "$out"
          cp target/${{ matrix.arch }}-unknown-linux-gnu/release/rspace-registry "$out/"
          cp LICENSE README.md "$out/"
          tar -C . -czf "dist/${out}.tar.gz" "$out"
          (cd dist && sha256sum "${out}.tar.gz" > "${out}.tar.gz.sha256")
          echo "tarball=dist/${out}.tar.gz" >>"$GITHUB_OUTPUT"
          echo "shafile=dist/${out}.tar.gz.sha256" >>"$GITHUB_OUTPUT"
      # actions/upload-artifact@v4 hard-rejects non-github.com servers
      # ("GHESNotSupportedError"), so this step is GH-only. Forcicd
      # builds skip it; the release-publish step still runs.
      - name: upload build artifacts to the workflow run
        if: github.server_url == 'https://github.com'
        uses: actions/upload-artifact@v4
        with:
          name: rspace-registry-${{ github.ref_name }}-${{ matrix.arch }}-linux
          path: |
            ${{ steps.pkg.outputs.tarball }}
            ${{ steps.pkg.outputs.shafile }}
          if-no-files-found: error
          retention-days: 90

      # The release ALWAYS lands on github.com/glennswest/rspace_registry —
      # the canonical surface. Forcicd builds the artifacts, then this
      # step pushes them to the GitHub release for the same tag.
      #
      # Token resolution:
      #   - On GitHub: GITHUB_TOKEN has contents:write per the permissions
      #     block above.
      #   - On Forgejo (forcicd.g8.lo): GITHUB_TOKEN has no github.com
      #     scope. Repo admin must set secret `GH_PAT` = a fine-grained
      #     PAT scoped to this repo with "Contents: read & write".
      - name: attach to GitHub Release (canonical)
        uses: softprops/action-gh-release@v2.0.8
        with:
          repository: glennswest/rspace_registry
          token: ${{ github.server_url == 'https://github.com' && secrets.GITHUB_TOKEN || secrets.GH_PAT }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} (${{ needs.resolve.outputs.release_type }})
          prerelease: ${{ needs.resolve.outputs.prerelease == 'true' }}
          files: |
            ${{ steps.pkg.outputs.tarball }}
            ${{ steps.pkg.outputs.shafile }}
          generate_release_notes: true
          fail_on_unmatched_files: true
